name: "CLA Assistant"

on:
  workflow_call:
    secrets:
      CLA_ASSISTANT_TOKEN:
        required: true

jobs:
  CLAAssistant:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
      pull-requests: write
      statuses: write
    steps:
      - name: "CLA Assistant"
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.3.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_ASSISTANT_TOKEN }}
        with:
          path-to-signatures: '.github/cla/signatures/version1/cla.json'
          path-to-document: 'https://github.com/rspace-os/.github/blob/main/CLA.md'
          branch: 'main'
          allowlist: mKowalski256,rs-nicof,tuxRamon,vaidap,rs-fraser,nebay-abraha,ll4strw,tchoi-rs,copilot-swe-agent[bot],github-copilot[bot]
          remote-organization-name: 'rspace-os'
          remote-repository-name: '.github'        # ← was '.cla'
